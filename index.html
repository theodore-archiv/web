<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO & Metadata Dasar -->
    <title>Theodore & Co.</title>
    <meta name="description" content="Semua momen adalah hadiah, dan kami merawatnya. Clothing brand berbasis fotografi digicam otentik.">
    <meta name="keywords" content="Theodore, Theodore Archives, Digicam Apparel, Clothing Brand Indonesia, Streetwear">
    <meta name="author" content="Theodore">

    <!-- Open Graph / WhatsApp / Social Media Preview -->
    <meta property="og:title" content="Theodore — Coming Soon">
    <meta property="og:description" content="Semua momen adalah hadiah, dan kami merawatnya.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://theodr.my.id">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Syne:wght@700&display=swap" rel="stylesheet">
    
    <!-- Hubungkan ke file CSS terpisah -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hiasan ala indikator kamera -->
    <div class="camera-ui-top">REC [●] ISO 400</div>

    <div class="container">
        <!-- Teks yang bakal diketik otomatis -->
        <div class="typing-container">
            <span id="text-target"></span><span class="cursor"></span>
        </div>
        
        <!-- Identitas Brand -->
        <h1 class="brand-name">THEODORE</h1>
        <div class="status-tag">— Coming Soon —</div>
    </div>

    <footer>
        &copy; 2026 Theodore Archives. All rights reserved.
    </footer>

    <script>
        const content = "semua momen adalah hadiah.\ndan kami merawatnya.";
        const target = document.getElementById("text-target");
        let index = 0;

        function typeWriter() {
            if (index < content.length) {
                target.innerHTML += content.charAt(index);
                index++;
                setTimeout(typeWriter, 70); // Kecepatan ngetik (ms)
            }
        }

        // Mulai animasi ketik setelah jeda 0.8 detik
        setTimeout(typeWriter, 800);
    </script>
</body>
</html>
