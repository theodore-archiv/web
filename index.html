   <style>
        @media screen and (max-width: 768px) {
            header {
                padding: 1.5rem !important;
                flex-direction: column;
                gap: 1rem;
            }
            header nav {
                gap: 1.5rem !important;
            }
            main {
                padding: 1.5rem !important;
            }
            main > div:nth-child(2) {
                grid-template-columns: 1fr !important;
                gap: 2.5rem !important;
            }
        }
    </style>
<body>

    <div class="camera-ui-top" id="camera-indicator">REC [●] ISO 400 · 1/250s</div>

    <div class="container">
        <div class="typing-container">
            <span id="text-target"></span><span class="cursor"></span>
        </div>
        
        <div class="brand-wrapper" id="brandWrapper">
            <h1 class="brand-name">THEODORE</h1>
            <div class="status-tag">— Coming Soon —</div>
        </div>
    </div>

    <footer>
        <div class="footer-email">hi@theodore.web.id</div>
        <div class="footer-copy">&copy; 2026 Theodore Archives. All rights reserved.</div>
    </footer>

    <script>
        const line1 = "semua momen adalah hadiah.";
        const line2 = "\ndan kami merawatnya.";
        const target = document.getElementById("text-target");
        const brandWrapper = document.getElementById("brandWrapper");
        
        let i = 0;
        let j = 0;

        function typeLine1() {
            if (i < line1.length) {
                target.innerHTML += line1.charAt(i);
                i++;
                setTimeout(typeLine1, 105);
            } else {
                setTimeout(typeLine2, 1300); 
            }
        }

        function typeLine2() {
            if (j < line2.length) {
                target.innerHTML += line2.charAt(j);
                j++;
                setTimeout(typeLine2, 105);
            } else {
                setTimeout(() => {
                    brandWrapper.classList.add('show');
                }, 700); 
            }
        }
        
        setTimeout(typeLine1, 800);

        const indicator = document.getElementById("camera-indicator");
        const states = [
            "REC [●] ISO 400 · 1/250s",
            "REC [  ] ISO 200 · 1/500s",
            "REC [●] ISO 800 · 1/125s",
            "STBY [ ] ISO 400 · 1/1000s"
        ];
        let stateIndex = 0;

        setInterval(() => {
            stateIndex = (stateIndex + 1) % states.length;
            indicator.style.opacity = '0.2'; 
            setTimeout(() => {
                indicator.innerText = states[stateIndex];
                indicator.style.opacity = '1';
            }, 200);
        }, 2200);
    </script>
</body>
